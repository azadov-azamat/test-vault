services:
  - type: web
    name: testvault-server
    runtime: node
    rootDir: server
    plan: free
    buildCommand: yarn install --frozen-lockfile --production=false && yarn build
    startCommand: yarn migrate:prod && yarn start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.19.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
